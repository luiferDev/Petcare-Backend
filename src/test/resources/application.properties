# Test Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for H2 in-memory tests
spring.flyway.enabled=false

# Required properties with test values
jwt.secret=testSecretKey123456789012345678901234567890
spring.mail.username=test@example.com
spring.mail.password=testpassword

# Disable mail and other services for tests
spring.mail.host=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Disable Redis for tests (no Redis in test environment)
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Override Redis host to invalid (won't try to connect)
spring.data.redis.host=localhost
spring.data.redis.port=63790

# Disable caching (uses Redis)
spring.cache.type=simple