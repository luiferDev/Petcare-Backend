spring.application.name=Petcare

# Configuraciï¿½n de la conexiï¿½n a la base de datos MySQL (con placeholders)
# MYSQL_HOST debe ser 'mysql' cuando se usa Docker Compose con el servicio MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql}:3306/petcare
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:petcare_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:petcare_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciï¿½n de Hibernate y JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# ===================================================================
# SERVER CONFIGURATION (Vital para Render)
# ===================================================================
server.address=0.0.0.0
server.port=${PORT:8080}
server.forward-headers-strategy=native

# ===================================================================
# JWT & SECURITY
# ===================================================================
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1wZXRjYXJlLWFwcA==}
jwt.expiration=86400000

# Configuraciï¿½n de logging - DESARROLLO
# Para producciï¿½n usar: application-prod.properties
debug=true
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.petcare=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=INFO
logging.level.org.springframework.data=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=INFO
# NO exponer passwords en logs
logging.level.org.springframework.security.core.userdetails.UserDetails=INFO

# Configuraciï¿½n de Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.url=/v3/api-docs

# Petcare API Configuration
# Production: http://petcare-backend-aqxbui-b9611d-144-225-147-45.traefik.me/
petcare.api.base-url=${PETCARE_API_BASE_URL:http://petcare-backend-aqxbui-b9611d-144-225-147-45.traefik.me/}
# ===================================================================
# OTRAS CONFIGURACIONES (Email, Swagger, etc.)
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@petcare.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:password}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Redis Cache Configuration
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# Spring Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=43200000
spring.cache.redis.cache-null-values=false

# Activar el perfil "local" para desarrollo
# Perfil activo por defecto
spring.profiles.active=local